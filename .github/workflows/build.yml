name: Build and Release InkLauncher

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Build APK with Gradle
      run: gradle assembleDebug --stacktrace

    - name: Upload Artifact (Action Summary)
      uses: actions/upload-artifact@v4
      with:
        name: InkLauncher-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Generate Release Tag & Name
      if: github.event_name == 'push'
      id: release_info
      run: |
        if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
          TAG_NAME="${{ github.ref_name }}"
          RELEASE_TITLE="InkLauncher Release ${TAG_NAME}"
        else
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          TAG_NAME="v1.0.0-build-${TIMESTAMP}"
          RELEASE_TITLE="InkLauncher Build ${TIMESTAMP}"
        fi
        echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
        echo "release_title=${RELEASE_TITLE}" >> $GITHUB_OUTPUT

    - name: Create New GitHub Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release_info.outputs.tag_name }}
        name: ${{ steps.release_info.outputs.release_title }}
        generate_release_notes: true
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
