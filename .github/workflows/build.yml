name: Cloud Android Release Compiler

on:
  release:
    types: [published]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Compile Installer (APK)
      run: gradle clean assembleDebug --stacktrace

    - name: Rename APK for Release
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/InkLaunch.apk

    - name: Upload APK to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/InkLaunch.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
