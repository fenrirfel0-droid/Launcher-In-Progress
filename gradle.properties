# Project-wide Gradle settings.

# Enable AndroidX mapping for backward compatibility
android.useAndroidX=true
android.enableJetifier=true

# Optimize build speeds by running Gradle as a background daemon
org.gradle.daemon=true
org.gradle.parallel=true

# Allocate memory for the build process (optimized for your device's heavy RAM specs)
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Enable the modern type-safe Kotlin compiler features
android.experimental.tryK2=true
