name: Cloud Android Release Compiler

on:
  release:
    types: [published] # This triggers the build ONLY when you officially publish a release
  workflow_dispatch: # Keeps the manual button active just in case you want to test build

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permissions to Gradle
      run: chmod +x gradlew
      continue-on-error: true

    - name: Compile Installer (APK)
      run: ./gradlew assembleDebug

    - name: Rename APK for Release
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/InkLaunch.apk

    - name: Upload APK to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/InkLaunch.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Built-in GitHub token, no setup needed
