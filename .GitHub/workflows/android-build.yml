name: Cloud Android Compiler

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually click a button to build anytime

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permissions to Gradle
      run: chmod +x gradlew
      continue-on-error: true

    - name: Compile Installer (APK)
      run: ./gradlew assembleDebug

    - name: Upload Finished APK File
      uses: actions/upload-artifact@v4
      with:
        name: InkLaunch-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
