name: Automated Android APK Compiler

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    # Forces the runner to fetch Gradle 8.2.2 so it matches your project plugins perfectly
    - name: Generate Matching Gradle Wrapper
      run: gradle wrapper --gradle-version 8.2.2

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Compile Launcher Installer (APK)
      run: ./gradlew assembleDebug --quiet

    - name: Upload Compiled APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PocketLaunch-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
